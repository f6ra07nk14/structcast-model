[tox]
requires = 
    tox>=4
    tox-uv>=1.0.0
env_list = 
    py{311,312,313}
skip_missing_interpreters = true

[testenv]
description = Base configuration for all test environments
package = editable
wheel_build_env = .pkg
runner = uv-venv-lock-runner

[testenv:py{311,312,313}]
description = Run type checking (mypy) and linting (ruff) on {envname}
deps = 
    mypy>=1.19.1
    ruff>=0.14.14
commands = 
    mypy src
    mypy tests
    ruff format --check src tests
    ruff check src tests
    pytest --no-cov

[testenv:lint]
description = Check code formatting and linting with ruff
skip_install = false
deps = 
    ruff>=0.14.14
commands = 
    ruff format --check src tests
    ruff check src tests

[testenv:format]
description = Auto-format code with ruff
skip_install = false
deps = 
    ruff>=0.14.14
commands = 
    ruff format src tests

[testenv:type-check]
description = Run type checking with mypy
skip_install = false
deps = 
    mypy>=1.19.1
commands = 
    mypy src
    mypy tests

[testenv:type-check-py{311,312,313}]
description = Run type checking with mypy across Python versions
skip_install = false
deps = 
    mypy>=1.19.1
commands = 
    mypy src
    mypy tests
